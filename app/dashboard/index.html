<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpaca Alpha | Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d12;
            --surface: #151922;
            --surface-soft: #1c2230;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5b8def;
            --success: #1fca7a;
            --danger: #f05252;
            --warning: #f5a524;
            --text: #f8fafc;
            --muted: #9aa6b2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Outfit", sans-serif;
            letter-spacing: 0;
        }

        .container {
            width: min(1440px, calc(100% - 32px));
            margin: 0 auto;
            padding: 18px 0 28px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .logo {
            font-size: 21px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 14px;
            min-width: 0;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            flex: 0 0 auto;
        }

        .pulse-dot.online {
            background: var(--success);
            box-shadow: 0 0 0 6px rgba(31, 202, 122, 0.12);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            min-width: 0;
        }

        .stat-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            line-height: 1.2;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .stat-sub {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
            min-height: 16px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tab-btn,
        .pg-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            border-radius: 8px;
            min-height: 38px;
            padding: 0 12px;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .search-input {
            width: min(320px, 100%);
            min-height: 40px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            font: inherit;
            outline: none;
        }

        .content-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.055);
            white-space: nowrap;
            vertical-align: middle;
        }

        th {
            background: var(--surface-soft);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        td {
            font-size: 14px;
        }

        .muted {
            color: var(--muted);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border-radius: 6px;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-approved,
        .status-filled,
        .status-buy,
        .status-long {
            background: rgba(31, 202, 122, 0.12);
            color: var(--success);
        }

        .status-rejected,
        .status-failed,
        .status-canceled,
        .status-sell,
        .status-short {
            background: rgba(240, 82, 82, 0.12);
            color: var(--danger);
        }

        .status-skip,
        .status-new,
        .status-submitted,
        .status-accepted,
        .status-partially_filled,
        .status-held {
            background: rgba(91, 141, 239, 0.14);
            color: var(--accent);
        }

        .status-pending,
        .status-warning {
            background: rgba(245, 165, 36, 0.14);
            color: var(--warning);
        }

        .pnl-positive { color: var(--success); }
        .pnl-negative { color: var(--danger); }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: var(--surface-soft);
        }

        .pg-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .empty-row {
            color: var(--muted);
            text-align: center;
            padding: 28px 14px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 960px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .controls-row,
            header {
                align-items: stretch;
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }
        }

        @media (max-width: 520px) {
            .container {
                width: min(100% - 20px, 1440px);
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .logo {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ALPACA ALPHA</div>
            <div class="status-line">
                <span id="pulse-dot" class="pulse-dot"></span>
                <span id="status-text">CONNECTING</span>
                <span id="last-sync" class="muted">-</span>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Equity</div>
                <div id="equity" class="stat-value">$0.00</div>
                <div id="account-status" class="stat-sub">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Buying Power</div>
                <div id="buying-power" class="stat-value">$0.00</div>
                <div id="cash" class="stat-sub">Cash $0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Day PnL</div>
                <div id="day-pnl" class="stat-value">$0.00</div>
                <div id="day-pnl-pct" class="stat-sub">0.00%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Positions</div>
                <div id="positions-count" class="stat-value">0</div>
                <div id="orders-count" class="stat-sub">Open Orders 0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Portfolio Value</div>
                <div id="portfolio-value" class="stat-value">$0.00</div>
                <div id="uptime" class="stat-sub">-</div>
            </div>
        </section>

        <div class="controls-row">
            <nav class="tabs">
                <button class="tab-btn active" data-tab="signals">Signals</button>
                <button class="tab-btn" data-tab="positions">Positions <span id="positions-tab-count">0</span></button>
                <button class="tab-btn" data-tab="openOrders">Open Orders <span id="open-orders-tab-count">0</span></button>
                <button class="tab-btn" data-tab="orderHistory">Order History (Today)</button>
                <button class="tab-btn" data-tab="holdings">Holdings</button>
            </nav>
            <input id="search" class="search-input" type="search" placeholder="Search" autocomplete="off">
        </div>

        <section class="content-card">
            <div class="table-wrap">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="prev-btn" class="pg-btn">Prev</button>
                <span id="page-info" class="muted">Page 1 of 1</span>
                <button id="next-btn" class="pg-btn">Next</button>
            </div>
        </section>
    </div>

    <script>
        const pageSize = 14;
        let currentTab = "signals";
        let currentPage = 1;
        let lastUpdate = 0;
        let refreshInFlight = false;
        let rawData = {
            signals: [],
            positions: [],
            openOrders: [],
            orderHistory: [],
            holdings: []
        };

        const columns = {
            signals: [
                ["timestamp", "Updated At"],
                ["symbol", "Symbol"],
                ["action", "Action"],
                ["confidence", "Confidence"],
                ["qty", "Qty"],
                ["target", "Target"],
                ["stop", "Stop"],
                ["validator_status", "Status"],
                ["reason_code", "Reason"]
            ],
            positions: [
                ["symbol", "Symbol"],
                ["side", "Side"],
                ["qty", "Qty"],
                ["avg_entry_price", "Avg Entry"],
                ["current_price", "Current"],
                ["market_value", "Market Value"],
                ["unrealized_pl", "Unrealized PnL"],
                ["unrealized_plpc", "PnL %"]
            ],
            openOrders: [
                ["submitted_at", "Submitted At"],
                ["symbol", "Symbol"],
                ["side", "Side"],
                ["order_type", "Type"],
                ["qty", "Qty"],
                ["filled_qty", "Filled"],
                ["time_in_force", "TIF"],
                ["status", "Status"],
                ["client_order_id", "Client ID"]
            ],
            orderHistory: [
                ["updated_at", "Updated At"],
                ["symbol", "Symbol"],
                ["side", "Side"],
                ["order_type", "Type"],
                ["qty", "Qty"],
                ["filled_qty", "Filled"],
                ["filled_avg_price", "Avg Fill"],
                ["status", "Status"]
            ],
            holdings: [
                ["symbol", "Symbol"],
                ["allocation_pct", "Allocation"],
                ["market_value", "Market Value"],
                ["qty", "Qty"],
                ["avg_entry_price", "Avg Entry"],
                ["current_price", "Current"],
                ["unrealized_pl", "Unrealized PnL"],
                ["unrealized_plpc", "PnL %"]
            ]
        };

        document.querySelectorAll(".tab-btn").forEach(button => {
            button.addEventListener("click", () => switchTab(button.dataset.tab));
        });
        document.getElementById("search").addEventListener("input", () => {
            currentPage = 1;
            renderTable();
        });
        document.getElementById("prev-btn").addEventListener("click", () => changePage(-1));
        document.getElementById("next-btn").addEventListener("click", () => changePage(1));

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            document.querySelectorAll(".tab-btn").forEach(button => {
                button.classList.toggle("active", button.dataset.tab === tab);
            });
            renderTable();
        }

        async function refreshData() {
            if (refreshInFlight) return;
            refreshInFlight = true;
            try {
                const response = await fetch("/api/dashboard", { cache: "no-store" });
                if (!response.ok) throw new Error(`Dashboard API ${response.status}`);
                const payload = await response.json();

                const service = payload.service || {};
                const account = payload.account || {};
                rawData = {
                    signals: payload.signals || [],
                    positions: payload.positions || [],
                    openOrders: payload.open_orders || [],
                    orderHistory: payload.order_history_today || [],
                    holdings: payload.holdings || []
                };

                updateStatus(service, account);
                updateStats(service, account);
                renderTable();
            } catch (error) {
                console.error(error);
                document.getElementById("pulse-dot").classList.remove("online");
                document.getElementById("status-text").textContent = "OFFLINE";
                document.getElementById("status-text").style.color = "var(--danger)";
            } finally {
                refreshInFlight = false;
            }
        }

        function updateStatus(service, account) {
            lastUpdate = Date.now();
            const paused = Boolean(service.is_paused);
            const blocked = Boolean(account.trading_blocked || account.account_blocked);
            const statusText = blocked ? "BLOCKED" : (paused ? "PAUSED" : "ACTIVE");
            const statusColor = blocked ? "var(--danger)" : (paused ? "var(--warning)" : "var(--success)");

            document.getElementById("pulse-dot").classList.add("online");
            document.getElementById("status-text").textContent = statusText;
            document.getElementById("status-text").style.color = statusColor;
            document.getElementById("last-sync").textContent = formatDateTime(service.fetched_at);
        }

        function updateStats(service, account) {
            setText("equity", money(account.equity));
            setText("buying-power", money(account.buying_power));
            setText("cash", `Cash ${money(account.cash)}`);
            setText("portfolio-value", money(account.portfolio_value));
            setText("positions-count", String(service.positions_count || rawData.positions.length));
            setText("positions-tab-count", String(rawData.positions.length));
            setText("orders-count", `Open Orders ${rawData.openOrders.length}`);
            setText("open-orders-tab-count", String(rawData.openOrders.length));
            setText("account-status", account.status || "-");

            const pnl = numberValue(account.day_pnl);
            const pnlPct = numberValue(account.day_pnl_pct);
            const dayPnlEl = document.getElementById("day-pnl");
            dayPnlEl.textContent = signedMoney(pnl);
            dayPnlEl.className = `stat-value ${pnl >= 0 ? "pnl-positive" : "pnl-negative"}`;
            setText("day-pnl-pct", signedPct(pnlPct));
            setText("uptime", service.uptime ? `Started ${formatDateTime(service.uptime)}` : "-");
        }

        function renderTable() {
            const tableColumns = columns[currentTab] || columns.signals;
            const rows = filteredRows(rawData[currentTab] || []);
            const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
            currentPage = Math.min(currentPage, totalPages);

            document.getElementById("table-head").innerHTML = `<tr>${tableColumns.map(([, label]) => `<th>${label}</th>`).join("")}</tr>`;

            const start = (currentPage - 1) * pageSize;
            const pageRows = rows.slice(start, start + pageSize);
            const body = document.getElementById("table-body");

            if (!pageRows.length) {
                body.innerHTML = `<tr><td class="empty-row" colspan="${tableColumns.length}">No rows</td></tr>`;
            } else {
                body.innerHTML = pageRows.map(row => {
                    return `<tr>${tableColumns.map(([key]) => `<td>${formatCell(key, row)}</td>`).join("")}</tr>`;
                }).join("");
            }

            setText("page-info", `Page ${currentPage} of ${totalPages}`);
            document.getElementById("prev-btn").disabled = currentPage <= 1;
            document.getElementById("next-btn").disabled = currentPage >= totalPages;
        }

        function filteredRows(rows) {
            const query = document.getElementById("search").value.trim().toLowerCase();
            if (!query) return rows;
            return rows.filter(row => JSON.stringify(row).toLowerCase().includes(query));
        }

        function formatCell(key, row) {
            const value = row[key];
            if (key.includes("_at") || key === "timestamp") {
                return formatDateTime(value || row.filled_at || row.submitted_at || row.created_at);
            }
            if (key === "action" || key === "side" || key === "status" || key === "validator_status") return badge(value);
            if (key === "confidence") return pct(numberValue(value), 0);
            if (key === "unrealized_plpc") return pnlText(numberValue(value), true);
            if (key === "unrealized_pl") return pnlText(numberValue(value), false);
            if (key === "allocation_pct") return `${numberValue(value).toFixed(2)}%`;
            if (["avg_entry_price", "current_price", "market_value", "filled_avg_price", "target", "stop"].includes(key)) return money(value);
            if (["qty", "filled_qty"].includes(key)) return qty(value);
            return escapeHtml(value ?? "-");
        }

        function badge(value) {
            const text = String(value || "-").toUpperCase();
            const cls = String(value || "pending").toLowerCase().replace(/\s+/g, "_");
            return `<span class="status-badge status-${cls}">${escapeHtml(text)}</span>`;
        }

        function pnlText(value, asPct) {
            const className = value >= 0 ? "pnl-positive" : "pnl-negative";
            const text = asPct ? signedPct(value) : signedMoney(value);
            return `<span class="${className}">${text}</span>`;
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function formatDateTime(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return escapeHtml(value);
            return date.toLocaleString(undefined, {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        function money(value) {
            const n = numberOrNull(value);
            if (n === null) return "-";
            return n.toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 2 });
        }

        function signedMoney(value) {
            return `${value >= 0 ? "+" : ""}${money(value)}`;
        }

        function pct(value, digits = 2) {
            return `${(value * 100).toFixed(digits)}%`;
        }

        function signedPct(value) {
            return `${value >= 0 ? "+" : ""}${pct(value)}`;
        }

        function qty(value) {
            const n = numberOrNull(value);
            if (n === null) return "-";
            return Number.isInteger(n) ? String(n) : n.toLocaleString(undefined, { maximumFractionDigits: 8 });
        }

        function numberOrNull(value) {
            if (value === null || value === undefined || value === "") return null;
            const n = Number(value);
            return Number.isFinite(n) ? n : null;
        }

        function numberValue(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : 0;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        setInterval(() => {
            if (!lastUpdate) return;
            const seconds = Math.round((Date.now() - lastUpdate) / 1000);
            if (seconds > 6) {
                document.getElementById("pulse-dot").classList.remove("online");
                document.getElementById("status-text").textContent = "LAGGING";
                document.getElementById("status-text").style.color = "var(--warning)";
            }
        }, 1000);

        refreshData();
        setInterval(refreshData, 2000);
    </script>
</body>
</html>
