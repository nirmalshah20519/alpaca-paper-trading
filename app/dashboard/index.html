<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpaca Trading System | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --active-tab: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 20% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);
        }

        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(90deg, #00ff88, #00a3ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.25rem; border-radius: 0.75rem; backdrop-filter: blur(10px); }
        .stat-label { color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 0.25rem; }
        .stat-value { font-size: 1.25rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* Tabs and Controls */
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 1rem; }
        
        .tabs { display: flex; gap: 1rem; }
        .tab-btn {
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1rem; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .tab-btn.active { color: var(--active-tab); border-bottom-color: var(--active-tab); }

        .search-container { flex: 1; max-width: 300px; position: relative; }
        .search-input {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.875rem;
        }

        /* Table Section */
        .content-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 1.5rem; backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; padding: 1rem; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); }

        .badge { padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .badge-buy { background: rgba(46, 213, 115, 0.1); color: var(--success); }
        .badge-sell { background: rgba(255, 71, 87, 0.1); color: var(--danger); }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1.5rem; font-size: 0.875rem; }
        .pg-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 0.4rem 0.8rem; border-radius: 0.25rem; cursor: pointer;
        }
        .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ALPACA TRADING DASHBOARD</div>
            <div id="service-status" class="status-badge">Live Status: <span id="status-text">...</span></div>
        </header>

        <div class="stats-bar">
            <div class="stat-card"><div class="stat-label">Equity</div><div id="equity" class="stat-value">$0.00</div></div>
            <div class="stat-card"><div class="stat-label">Buying Power</div><div id="buying-power" class="stat-value">$0.00</div></div>
            <div class="stat-card"><div class="stat-label">Open Orders</div><div id="open-orders-count" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">Uptime</div><div id="uptime" class="stat-value">00:00:00</div></div>
        </div>

        <div class="controls-row">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('signals')">RECENT SIGNALS</button>
                <button class="tab-btn" onclick="switchTab('orders')">OPEN ORDERS</button>
            </div>
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="Search symbol..." oninput="handleSearch()">
            </div>
        </div>

        <div class="content-box">
            <!-- Signals Table -->
            <div id="signals-tab">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Symbol</th>
                            <th>Action</th>
                            <th>Conf</th>
                            <th>Target</th>
                            <th>Stop</th>
                            <th>Validator</th>
                        </tr>
                    </thead>
                    <tbody id="signals-body"></tbody>
                </table>
            </div>

            <!-- Orders Table -->
            <div id="orders-tab" class="hidden">
                <table>
                    <thead>
                        <tr>
                            <th>Opened At</th>
                            <th>Symbol</th>
                            <th>Side</th>
                            <th>Qty</th>
                            <th>ID</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body"></tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-btn" class="pg-btn" onclick="changePage(-1)">PREV</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="next-btn" class="pg-btn" onclick="changePage(1)">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'signals';
        let rawData = { signals: [], orders: [] };
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 10;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
            document.getElementById('signals-tab').classList.toggle('hidden', tab !== 'signals');
            document.getElementById('orders-tab').classList.toggle('hidden', tab !== 'orders');
            currentPage = 1;
            applyFilters();
        }

        async function refreshData() {
            try {
                const [stRes, hiRes] = await Promise.all([fetch('/api/status'), fetch('/api/history')]);
                const st = await stRes.json();
                const hi = await hiRes.json();

                // Update Stats
                document.getElementById('status-text').innerText = st.is_paused ? 'PAUSED' : 'ACTIVE';
                document.getElementById('equity').innerText = `$${(st.account?.equity || 0).toLocaleString()}`;
                document.getElementById('buying-power').innerText = `$${(st.account?.buying_power || 0).toLocaleString()}`;
                document.getElementById('open-orders-count').innerText = hi.open_orders.length;
                
                const start = new Date(st.uptime);
                const diff = new Date(new Date() - start);
                document.getElementById('uptime').innerText = diff.toISOString().substr(11, 8);

                rawData.signals = hi.signals;
                rawData.orders = hi.open_orders;
                
                applyFilters();
            } catch (e) { console.error(e); }
        }

        function applyFilters() {
            const query = document.getElementById('search').value.toLowerCase();
            const source = currentTab === 'signals' ? rawData.signals : rawData.orders;
            
            filteredData = source.filter(item => 
                (item.symbol || '').toLowerCase().includes(query) ||
                (item.action || '').toLowerCase().includes(query) ||
                (item.status || '').toLowerCase().includes(query)
            );
            
            renderTable();
        }

        function handleSearch() {
            currentPage = 1;
            applyFilters();
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageItems = filteredData.slice(start, end);
            const totalPages = Math.ceil(filteredData.length / pageSize) || 1;

            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;

            if (currentTab === 'signals') {
                document.getElementById('signals-body').innerHTML = pageItems.map(s => `
                    <tr>
                        <td>${(s.timestamp || '').split('T')[1]?.split('.')[0] || s.timestamp}</td>
                        <td style="font-family: 'JetBrains Mono';">${s.symbol}</td>
                        <td><span class="badge badge-${(s.action||'').toLowerCase()}">${s.action}</span></td>
                        <td>${(s.confidence * 100).toFixed(0)}%</td>
                        <td>${s.target || '-'}</td>
                        <td>${s.stop || '-'}</td>
                        <td style="color: ${s.validator_status === 'APPROVED' ? 'var(--success)' : 'var(--danger)'}">${s.validator_status}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('orders-body').innerHTML = pageItems.map(o => `
                    <tr>
                        <td>${(o.opened_at || '').split('T')[1]?.split('.')[0] || o.opened_at}</td>
                        <td style="font-family: 'JetBrains Mono';">${o.symbol}</td>
                        <td>${o.entry_side}</td>
                        <td>${o.qty}</td>
                        <td style="font-size: 0.6rem; opacity: 0.5;">${o.alpaca_order_id}</td>
                        <td><span style="color: var(--accent-color)">${o.status}</span></td>
                    </tr>
                `).join('');
            }
        }

        setInterval(refreshData, 5000);
        refreshData();
    </script>
</body>
</html>
